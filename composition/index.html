<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperframes Composition</title>
  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: transparent;
      color: #f6f1e8;
      font-kerning: normal;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgb(255 255 255 / 0.04), transparent 38%),
        radial-gradient(ellipse at 50% 52%, rgb(255 255 255 / 0.07), transparent 48%),
        #0b0b0d;
    }

    .preview-pending-scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    .preview-pending-scene::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(90deg, rgb(255 255 255 / 0.03), transparent 34%),
        linear-gradient(180deg, transparent 58%, rgb(0 0 0 / 0.34));
    }

    .preview-pending-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image:
        linear-gradient(90deg, rgb(255 255 255 / 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgb(255 255 255 / 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%);
    }

    .preview-pending-content {
      position: relative;
      width: 520px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      will-change: transform, opacity;
    }

    .preview-pending-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgb(246 241 232 / 0.64);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
    }

    .preview-pending-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #d6a15c;
      box-shadow: 0 0 24px rgb(214 161 92 / 0.7);
    }

    .preview-pending-title {
      max-width: 520px;
      margin-top: 20px;
      font-size: 54px;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 0.98;
    }

    .preview-pending-subtitle {
      max-width: 430px;
      margin-top: 14px;
      color: rgb(246 241 232 / 0.58);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1.35;
    }

    .preview-pending-progress {
      width: 360px;
      height: 2px;
      margin-top: 32px;
      overflow: hidden;
      background: rgb(246 241 232 / 0.12);
    }

    .preview-pending-progress span {
      display: block;
      width: 100%;
      height: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #9c7441, #f1d4a8);
    }
  </style>
</head>
<body>
  <div
    id="stage"
    data-composition-id="Main"
    data-start="0"
    data-duration="11.667"
    data-width="1920"
    data-height="1080"
    data-motionabl-fps="30"
    data-motionabl-scenes='[{"label":"Preview","from":0,"durationInFrames":350}]'
  >
    <div
      id="preview-pending"
      class="clip preview-pending-scene"
      data-start="0"
      data-duration="11.667"
      data-track-index="0"
    >
      <div class="preview-pending-grid" aria-hidden="true"></div>
      <div class="preview-pending-content">
        <div class="preview-pending-status">
          <span class="preview-pending-dot"></span>
          <span>Preview</span>
        </div>
        <div class="preview-pending-title">Preparing preview</div>
        <div class="preview-pending-subtitle">
          Generated scenes will appear here when ready.
        </div>
        <div class="preview-pending-progress" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <script src="./vendor/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    const timeline = gsap.timeline({ paused: true });
    timeline.from(".preview-pending-content", {
      opacity: 0,
      y: 34,
      scale: 0.98,
      duration: 0.8,
      ease: "power4.out",
    }, 0);
    timeline.from(".preview-pending-grid", {
      opacity: 0,
      scale: 1.08,
      duration: 1.1,
      ease: "power3.out",
    }, 0);
    timeline.to(".preview-pending-dot", {
      opacity: 0.35,
      duration: 0.9,
      yoyo: true,
      repeat: 10,
      ease: "sine.inOut",
    }, 0.25);
    timeline.fromTo(".preview-pending-progress span", {
      scaleX: 0.08,
    }, {
      scaleX: 0.82,
      duration: 5.8,
      yoyo: true,
      repeat: 1,
      ease: "power2.inOut",
    }, 0.4);
    timeline.to(".preview-pending-grid", {
      opacity: 0.28,
      duration: 0.001,
      ease: "none",
    }, 11.667);

    window.__timelines.Main = timeline;
  </script>
</body>
</html>
